server:
  servlet:
    encoding:
      charset: utf-8
      force: true

spring:
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
  output:
    ansi:
      enabled: always
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 60MB

logging:
  level:
    com.capturecat.core: DEBUG
    org:
      hibernate.orm.jdbc.bind: TRACE
      springframework.security: DEBUG

jwt:
  access-token-expiration: 36000000 # *10 for development
  refresh-token-expiration: 2592000000
