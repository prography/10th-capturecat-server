server:
  port: 80
  servlet:
    encoding:
      charset: utf-8
      force: true

spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
  output:
    ansi:
      enabled: always

image:
  local:
    base-path: ${user.home}/Desktop/capturecat/upload
  s3:
    bucket: dummy
    dir_prefix: dummy
    url-prefix: dummy

logging:
  level:
    com.capturecat.core: DEBUG
    org:
      hibernate.orm.jdbc.bind: TRACE
      springframework.security: DEBUG

jwt:
  secret: capture_cat_jwt_secret_key_capture_cat_jwt_secret_key
  access-token-expiration: 3600000       # 1시간
  refresh-token-expiration: 604800000    # 7일
