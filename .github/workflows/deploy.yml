name: Deploy To EC2

on:
  push:
    branches:
      - feature/#70-cicd  # 테스트를 위해 develop 대신 이 브랜치만 감지

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: JDK 21버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: application.yml 파일 만들기
        run: |
          mkdir -p ./capturecat-core/src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./capturecat-core/src/main/resources/application-prod.yml

      - name: 테스트 및 빌드하기 (core만 빌드)
        run: ./gradlew :capturecat-core:clean :capturecat-core:build

      - name: 빌드된 파일 이름 변경하기
        run: mv ./capturecat-core/build/libs/capturecat-core-*.jar ./project.jar

      - name: SCP로 EC2에 빌드된 파일 전송하기
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: project.jar
          target: /home/ubuntu/capturecat-server/tobe

      - name: SSH로 EC2에 접속하여 서비스 재기동
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true    # 중간에 에러나면 실패 처리
          script: |
            sudo fuser -k -n tcp 80 || true
            sleep 3
            sudo rm -rf /home/ubuntu/capturecat-server/current
            sudo mkdir /home/ubuntu/capturecat-server/current
            sudo mv /home/ubuntu/capturecat-server/tobe/project.jar /home/ubuntu/capturecat-server/current/project.jar
            cd /home/ubuntu/capturecat-server/current
            sudo nohup java -jar project.jar --spring.profiles.active=prod > output.log 2>&1 &
            # 최대 30초 대기
            for i in {1..30}; do
              if ps -ef | grep '[p]roject.jar' > /dev/null; then
                echo "프로세스 실행됨"
                break
              fi
              sleep 1
              if [ $i -eq 30 ]; then
                echo "실행 실패!"
                exit 1
              fi
            done
            sudo rm -rf /home/ubuntu/capturecat-server/tobe
