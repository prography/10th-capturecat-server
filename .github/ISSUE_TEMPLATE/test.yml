name: "테스트 보강 (Test Improvement)"
description: "기존 테스트 커버리지를 보완하거나 새로운 테스트 케이스를 추가합니다."
labels: ["test"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🧪 테스트 코드 보강
        현재 테스트의 어떤 부분이 부족하거나 누락되어 있는지 구체적으로 작성해 주세요.

  - type: input
    id: title
    attributes:
      label: 📌 테스트 항목 이름
      description: 어떤 기능/모듈의 테스트인지 요약해 주세요.
      placeholder: 예) 예약 생성 API 통합 테스트 보강
    validations:
      required: true

  - type: textarea
    id: current-issue
    attributes:
      label: 🔍 현재 테스트의 한계 또는 누락된 시나리오
      description: 기존 테스트에서 어떤 케이스가 빠져 있는지, 어떤 문제가 발생하고 있는지 작성해 주세요.
      placeholder: |
        - 실패 케이스에 대한 테스트가 부족함
        - 동시성 테스트가 없음
        - 경계 조건 (예: 빈 값, null, max-length) 처리 누락
    validations:
      required: true

  - type: textarea
    id: improvement-plan
    attributes:
      label: 🧠 보강 계획
      description: 어떤 방식으로 테스트를 추가하거나 수정할 예정인지 구체적으로 작성해 주세요.
      placeholder: |
        - 정상/예외 케이스 구분 테스트 추가
        - 통합 테스트에 실패 케이스 추가
        - mock 기반 단위 테스트 도입

  - type: textarea
    id: task-list
    attributes:
      label: ✅ 작업 항목 (자유 체크리스트)
      description: 구체적인 작업 항목을 체크리스트로 작성해 주세요.
      placeholder: |
        - [ ] 실패 응답 테스트 추가
        - [ ] 동시성 시나리오 테스트 작성
        - [ ] 엣지 케이스 (빈 값, 특수문자 등) 테스트 추가

  - type: textarea
    id: additional-context
    attributes:
      label: 💬 추가 정보
      description: 참고할 코드, 에러 로그, 테스트 실행 결과 등이 있다면 첨부해 주세요.
