name: "기능 제안 (Feature Request)"
description: "새로운 기능 또는 명세를 추가 및 제안합니다."
labels: ["feature"]

body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 새로운 기능 제안
        새롭게 제안하고 싶은 기능에 대한 아이디어를 자유롭게 작성해주세요.

  - type: input
    id: title
    attributes:
      label: 📌 기능 이름
      description: 가능한 간결하고 명확한 이름으로 기능을 요약해 주세요.
      placeholder: 예) 캘린더 필터 기능 추가
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 기능 설명
      description: 이 기능이 무엇이며 왜 필요한지 상세히 설명해 주세요.
      placeholder: |
        - 어떤 문제를 해결하는지
        - 어떤 사용자 경험을 개선하는지
        - 기능이 어떻게 동작해야 하는지
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ 기대 동작
      description: 이 기능이 추가되었을 때 어떤 변화가 생기는지 구체적으로 서술해 주세요.
      placeholder: 예) 사용자는 날짜별로 일정을 필터링할 수 있고, 목록이 즉시 갱신됩니다.

  - type: textarea
    id: task-list
    attributes:
      label: 🧩 세부 작업(Task)
      description: 이 기능을 구현하기 위해 필요한 작업을 자유롭게 작성해 주세요.
      placeholder: |
        - [ ] 도메인 설계
        - [ ] API 명세 작성

  - type: textarea
    id: additional-context
    attributes:
      label: 💬 추가 정보
      description: 관련된 자료(화면 캡처, 레퍼런스 링크 등)가 있다면 첨부해 주세요.
